version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_merchants
    columns:
      - name: merchant_key
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: dim_locations
    columns:
      - name: location_key
        tests:
          - unique
          - not_null

  - name: fct_transactions
    columns:
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key
      - name: merchant_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_merchants')
                field: merchant_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: location_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key